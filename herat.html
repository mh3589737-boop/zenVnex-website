<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="logo.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Herat - ZENVNEX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-space: #050505;
    --panel-space: #0c0d10;
    --border-space: #22262e;
    --text-main: #f0f2f5;
    --text-muted: #9ba1a6;
    --maxw:1180px;
  }

  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background: var(--bg-space);
    color: var(--text-main);
    font-family:'Inter', -apple-system, sans-serif;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }

  a{color:inherit; text-decoration:none;}

  header{
    position:sticky; top:0; z-index:100;
    background: rgba(5,5,5,0.85);
    backdrop-filter:blur(12px);
    border-bottom: 1px solid var(--border-space);
  }
  .wrap{max-width:var(--maxw); margin:0 auto; padding:0 32px; display:flex; justify-content:space-between; align-items:center; height:78px;}
  
  .logo{
    font-family:'Inter', sans-serif;
    font-size:20px;
    font-weight:700;
    letter-spacing:0.15em;
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    gap:2px;
    color: #fff;
  }
  .logo .tagline{
    font-family:'Share Tech Mono',sans-serif;
    font-size:9.5px;
    letter-spacing:0.2em;
    text-transform:uppercase;
    color:var(--text-muted);
  }

  .btn-back{
    font-family:'Share Tech Mono', monospace;
    font-size:12px;
    font-weight:650;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color: var(--text-muted);
    border: 1px solid var(--border-space);
    padding: 10px 20px;
    background: var(--panel-space);
    transition: all 0.2s;
  }
  .btn-back:hover{color:#fff; border-color:#fff;}

  main{
    min-height: 75vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 80px 20px;
  }

  .content-box{
    background: var(--panel-space);
    border: 1px solid var(--border-space);
    padding: 50px 40px;
    max-width: 680px;
    width: 100%;
    text-align: center;
  }

  h2{
    font-family:'Inter', sans-serif;
    font-size:clamp(22px, 2.8vw, 28px);
    font-weight:700;
    letter-spacing:-0.02em;
    color: #fff;
    margin-bottom: 12px;
  }

  p{
    color: var(--text-muted);
    font-size: 15px;
    line-height: 1.7;
  }

  .divider{
    width: 40px;
    height: 1px;
    background: var(--border-space);
    margin: 30px auto;
  }

  footer{
    padding: 50px 0;
    border-top: 1px solid var(--border-space);
    text-align: center;
    color: var(--text-muted);
    font-size: 12px;
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 0.05em;
    background: var(--bg-space);
  }
</style>
</head>
<body>

<header>
  <div class="wrap">
    <a href="index.html" class="logo">
      ZENVNEX<span class="tagline">The New Life</span>
    </a>
    <a href="index.html" class="btn-back">← Back to Home</a>
  </div>
</header>

<main>
  <div class="content-box">
    <div>
      <h2>صفحه فعلا در دسترس نیست</h2>
      <p>محتوا های مربوطه به زودی بارگذاری خواهد شد.</p>
    </div>
    
    <div class="divider"></div>

    <div>
      <h2>Page currently unavailable</h2>
      <p>Relevant content will be uploaded soon.</p>
    </div>
  </div>
</main>

<footer>
  <p>© 2026 ZENVNEX e.V. · All Rights Reserved</p>
</footer>

</body>
</html>
